{% extends 'base.html' %}
{% block content %}
<table>
<thead>
    <tr>
        <th>Название счёта</th>
        <th>Баланс</th>
        <th>Служебное значение</th>
    </tr>
</thead>
<tbody>
    {% for object in object_list %}
    <tr>
        <td>{{ object.name }}</td>
        <td>{{ object.value|floatformat:2 }}</td>
        <td>{{ object.no_d }}</td>

    </tr>
    {% endfor %}
</tbody>
</table>
{% endblock content %}
